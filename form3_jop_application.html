<!DOCTYPE html>
<html>
    <head>
        <title> Job Application</title>
    </head>
    <body>
        <h1><b>Application</b></h1>
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter name" required>
            <br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter email" required>
            <br><br>

            <label for="phone">Phone:</label>
            <input type="number" id="phone" name="phone" placeholder="Enter phone number" required>
            <br><br>

            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob" name="dob" required>
            <br><br>

            <label for="education">Education:</label>
            <select id="education" name="education" required>
                <option value="">Select education</option>
                <option value="ug">Undergraduate</option>
                <option value="pg">Postgraduate</option>
                <option value="phd">PhD</option>
            </select>
            <br><br>

            <label for="experience">Experience (years):</label>
            <input type="number" id="experience" name="experience" placeholder="Enter years" required>
            <br><br>

            <label for="skills">Primary Skill:</label>
            <input type="text" id="skills" name="skills" placeholder="Enter skill" required>
            <br><br>


            <button>Submit</button>
         </form>

    </body>
</html>
