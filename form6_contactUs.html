<!DOCTYPE html>
<html>
    <head>
        <title>Contact US</title>
    </head>
    <body>
        <h1><b>Contact us</b></h1>
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter name" required><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter email" required><br><br>

            <label for="phone">Phone:</label>
            <input type="number" id="phone" name="phone" placeholder="Enter phone number" required><br><br>

            <label for="subject">Subject:</label>
            <input type="text" id="subject" name="subject" placeholder="Enter subject" required><br><br>

            <label for="message">Message:</label>
            <input type="text" id="message" name="message" placeholder="Enter message" required><br><br>

            <label for="contact">Preferred Contact Method:</label>
            <select id="contact" name="contact" required>
                <option value="">Select method</option>
                <option value="email">Email</option>
                <option value="phone">Phone</option>
            </select><br><br>

            <label for="department">Department:</label>
            <select id="department" name="department" required>
                <option value="">Select department</option>
                <option value="sales">Sales</option>
                <option value="support">Support</option>
                <option value="hr">HR</option>
            </select><br><br>

            <label for="date">Date:</label>
            <input type="date" id="date" name="date" required><br><br>

            <label for="file">Upload File:</label>
            <input type="file" id="file" name="file" required><br><br>

            <button>Submit</button>
         </form>

    </body>
</html>
