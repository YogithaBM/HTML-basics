<!DOCTYPE html>
<html><head>
    <title>Feedback</title>
</head>
<body>
    <h1><b><mark>Feedback</mark></b></h1>
     <form>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter name" required>
        <br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter email" required>
        <br><br>

        <label for="product">Product ID:</label>
        <input type="text" id="product" name="product" placeholder="Enter product ID" required>
        <br><br>

        <label for="rating">Rating:</label>
        <select id="rating" name="rating" required>
            <option value="">Select rating</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
        </select>
        <br><br>

        <label for="category">Category:</label>
        <select id="category" name="category" required>
            <option value="">Select category</option>
            <option value="service">Service</option>
            <option value="product">Product</option>
            <option value="support">Support</option>
        </select>
        <br><br>

        <label for="date">Date:</label>
        <input type="date" id="date" name="date" required>
        <br><br>

        <label for="issue">Issue Code:</label>
        <input type="text" id="issue" name="issue" placeholder="Enter issue code" required>
        <br><br>


        <button>Submit</button>
        </form>

</body></html>
