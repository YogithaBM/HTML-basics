<!DOCTYPE html>
<html>
    <head>
        <title>Survey Form</title>
    </head>
    <body>
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter name" required>
            <br><br>

            <label for="age">Age:</label>
            <input type="number" id="age" name="age" placeholder="Enter age" required>
            <br><br>

            <label for="gender">Gender:</label>
            <select id="gender" name="gender" required>
                <option value="">Select gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>
            <br><br>

            <label for="location">Location:</label>
            <input type="text" id="location" name="location" placeholder="Enter location" required>
            <br><br>

            <label for="occupation">Occupation:</label>
            <input type="text" id="occupation" name="occupation" placeholder="Enter occupation" required>
            <br><br>

            <label for="income">Income Range:</label>
            <select id="income" name="income" required>
                <option value="">Select range</option>
                <option value="low">Below 20k</option>
                <option value="mid">20k-50k</option>
                <option value="high">Above 50k</option>
            </select>
            <br><br>

            <label for="preference">Preference:</label>
            <select id="preference" name="preference" required>
                <option value="">Select preference</option>
                <option value="option1">Option 1</option>
                <option value="option2">Option 2</option>
            </select>
            <br><br>

            <label for="interest">Interest:</label>
            <input type="text" id="interest" name="interest" placeholder="Enter interest" required>
            <br><br>

            <label for="date">Survey Date:</label>
            <input type="date" id="date" name="date" required>
            <br><br>

            <button>Submit</button>
            </form>

    </body>
</html>
