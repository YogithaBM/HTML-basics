<!DOCTYPE html>
<html>
    <head><title>Login Form</title></head>
    <body>
        <h1><b><mark>Login Form</mark></b></h1>
        <form>
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" required>
            <br><br>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
            <br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
            <br><br>

            <label for="mobile">Mobile:</label>
            <input type="number" id="mobile" name="mobile" placeholder="Enter Phone number" required>
            <br><br>

            <label for="role">Role:</label>
            <select id="role" name="role" required>
                <option value="student">Student</option>
                <option value="admin">Admin</option>
                <option value="guest">Guest</option>
            </select>
            <br><br>

            <label for="otp">OTP:</label>
            <input type="number" id="otp" name="otp" placeholder="ENter OTP" required>
            <br><br>

            <label for="security">Security Question:</label>
            <select id="security" name="security" required>
                <option value="pet">Your pet's name?</option>
                <option value="school">Your first school?</option>
                <option value="city">Your birth city?</option>
            </select>
            <br><br>

            <button>Submit</button>

    </body>
</html>
