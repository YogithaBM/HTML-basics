    <!DOCTYPE html>
    <html>
        <head>
            <title>Checkout</title>
        </head>

        <body>
            <h1><b>Checkout Form</b></h1>
            <form>
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" placeholder="Enter full name" required>
                <br><br>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Enter email" required>
                <br><br>

                <label for="phone">Phone:</label>
                <input type="number" id="phone" name="phone" placeholder="Enter phone number" required>
                <br><br>

                <label for="address">Address:</label>
                <input type="text" id="address" name="address" placeholder="Enter address" required>
                <br><br>

                <label for="city">City:</label>
                <input type="text" id="city" name="city" placeholder="Enter city" required>
                <br><br>

                <label for="state">State:</label>
                <input type="text" id="state" name="state" placeholder="Enter state" required>
                <br><br>

                <label for="zip">Zip Code:</label>
                <input type="number" id="zip" name="zip" placeholder="Enter zip code" required>
                <br><br>

                <label for="payment">Payment Method:</label>
                <select id="payment" name="payment" required>
                    <option value="">Select payment</option>
                    <option value="card">Card</option>
                    <option value="upi">UPI</option>
                    <option value="cod">Cash on Delivery</option>
                </select>
                <br><br>

                <label for="delivery">Delivery Option:</label>
                <select id="delivery" name="delivery" required>
                    <option value="">Select delivery</option>
                    <option value="standard">Standard</option>
                    <option value="express">Express</option>
                </select>
                <br><br>

                <label for="promo">Promo Code:</label>
                <input type="text" id="promo" name="promo" placeholder="Enter promo code" required>
                <br><br>

            <button>Submit</button>
         </form>

        </body>
    </html>
